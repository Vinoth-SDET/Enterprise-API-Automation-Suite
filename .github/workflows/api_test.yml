name: API Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Check out your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 — Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Step 3 — Create config.properties from GitHub Secret
      # This is how professionals handle API keys in CI/CD
      - name: Create config.properties
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/config.properties << EOF
          base.url=https://jsonplaceholder.typicode.com
          base.path=
          api.key=none
          default.user.id=2
          default.timeout=10000
          EOF

      # Step 4 — Run tests with Maven
      - name: Run API Tests
        run: mvn clean test

      # Step 5 — Upload Allure results as artifact
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30

      # Step 6 — Generate Allure HTML Report
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          allure_report: allure-report
          allure_history: allure-history

      # Step 7 — Publish report to GitHub Pages
      - name: Publish Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      # Step 8 — Upload Surefire test report
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 30